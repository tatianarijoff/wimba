# Example WIMBA machine config.
# Build it with:  wimba build examples/machine.yaml --out results
# Inspect it with: wimba show results

grid:
  freq: {min: 1.0e8, max: 3.0e9, n: 400, log: true}
  time: {min: 0.0,   max: 5.0e-9, n: 400}

# optics: element name -> [beta_x, beta_y]; elements look themselves up here by name
twiss:
  c1: [10.0, 20.0]
  c2: [30.0, 40.0]
  p1: [5.0, 5.0]

groups:
  collimators:
    - name: c1
      category: collimator
      source: resonator
      resonators:
        - {term: zlong, Rs: 1.0e4, Q: 1.0, fr: 1.0e9}
        - {term: zxdip, Rs: 1.0e6, Q: 1.0, fr: 1.0e9}
    - name: c2
      category: collimator
      source: resonator
      resonators:
        - {term: zlong, Rs: 2.0e4, Q: 1.0, fr: 1.2e9}
  pipes:
    - name: p1
      category: pipe
      source: resonator
      resonators:
        - {term: zlong, Rs: 4.0e1, Q: 1.0, fr: 0.9e9}

# already-weighted contributions kept apart (e.g. an externally summed model)
additional:
  - name: crab
    category: additional
    source: resonator
    pre_weighted: true
    resonators:
      - {term: zlong, Rs: 7.0e3, Q: 1.0, fr: 0.8e9}
