# Single-chamber verification example.
# Mirrors the Wake2D "RoundChamber" reference: CIRCULAR, radius 2 mm, L = 1 m,
# beta = 1, one layer sigma = 2e5 S/m, gamma = 479.605. Running this produces the
# WIMBA plots for the same chamber, to check the values against the reference.
#
#   wimba run examples/RoundChamber/RoundChamber_input.yaml --wake

name: RoundChamber
gamma: 479.605

grid:
  frequency: {min: 1.0e3, max: 1.0e11, n: 300, log: true}

devices:
  round_chamber:
    source: chamber
    name: LHC_1layers_2mm_test_coll_round
    method: pytlwall
    space_charge: true
    radius_m: 0.002
    length_m: 1.0
    beta_x: 1.0
    beta_y: 1.0
    layers:
      - {sigma: 2.0e5, thickness: inf}

# single chamber -> write it individually too
output: [LHC_1layers_2mm_test_coll_round]
